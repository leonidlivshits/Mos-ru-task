services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Mos.ru Lost Items Demo}
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-lost_items}:${POSTGRES_PASSWORD:-lost_items_password}@db:5432/${POSTGRES_DB:-lost_items_demo}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lost_items_demo}
      POSTGRES_USER: ${POSTGRES_USER:-lost_items}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lost_items_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lost_items} -d ${POSTGRES_DB:-lost_items_demo}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
